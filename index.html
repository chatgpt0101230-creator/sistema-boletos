<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Boletos</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div class="container" id="loginTela">

    <div class="login-box">

      <h1>Sistema de Boletos</h1>

      <input type="email" id="email" placeholder="Digite seu email">

      <input type="password" id="senha" placeholder="Digite sua senha">

      <button id="btnLogin">Entrar</button>

      <button id="btnCadastro">Criar Conta</button>

      <p id="mensagem"></p>

    </div>

  </div>

  <!-- PAINEL -->
  <div class="painel hidden" id="painel">

    <header>

      <h1>Painel de Boletos</h1>

      <button id="btnSair">Sair</button>

    </header>

    <div class="formulario">

      <input type="text" id="cliente" placeholder="Nome do cliente">

      <input type="number" id="valor" placeholder="Valor">

      <input type="date" id="vencimento">

      <select id="status">
        <option>Pendente</option>
        <option>Pago</option>
        <option>Vencido</option>
      </select>

      <textarea id="obs" placeholder="Observações"></textarea>

      <button id="btnSalvarBoleto">
        Salvar Boleto
      </button>

    </div>

    <div class="lista">

      <h2>Histórico</h2>

      <div id="listaBoletos"></div>

    </div>

  </div>

  <script type="module" src="script.js"></script>

</body>
</html>
